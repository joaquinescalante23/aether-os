// Chronos: The Agent Operating System (A-OS)
// Protocol Definition v1.0
//
// Created by Joaquín Escalante (https://github.com/joaquinescalante23)

syntax = "proto3";

package chronos;

import "google/protobuf/timestamp.proto";

service ChronosKernel {
    // Lifecycle Management
    rpc SpawnAgent (SpawnAgentRequest) returns (SpawnAgentResponse);
    rpc StopAgent (StopAgentRequest) returns (StopAgentResponse);
    rpc PauseAgent (PauseAgentRequest) returns (PauseAgentResponse);
    rpc ResumeAgent (ResumeAgentRequest) returns (ResumeAgentResponse);

    // Monitoring & Inspection
    rpc ListAgents (ListAgentsRequest) returns (ListAgentsResponse);
    rpc InspectAgent (InspectAgentRequest) returns (InspectAgentResponse);
    rpc MonitorAgent (MonitorAgentRequest) returns (stream AgentEvent);
}

// --- Lifecycle Requests & Responses ---

message SpawnAgentRequest {
    string name = 1;
    string model_id = 2; // e.g., "openai/gpt-4o", "anthropic/claude-3-5-sonnet"
    string initial_prompt = 3;
    Budget budget = 4;
}

message SpawnAgentResponse {
    string agent_id = 1;
    AgentState state = 2;
    google.protobuf.Timestamp created_at = 3;
}

message StopAgentRequest {
    string agent_id = 1;
}

message StopAgentResponse {
    string agent_id = 1;
    Stats final_stats = 2;
}

message PauseAgentRequest {
    string agent_id = 1;
}

message PauseAgentResponse {
    string checkpoint_id = 1;
    google.protobuf.Timestamp paused_at = 2;
}

message ResumeAgentRequest {
    string agent_id = 1;
    string checkpoint_id = 2; // Optional, defaults to latest if empty
}

message ResumeAgentResponse {
    string agent_id = 1;
    AgentState state = 2;
}

// --- Monitoring Requests & Responses ---

message ListAgentsRequest {}

message ListAgentsResponse {
    repeated AgentSummary agents = 1;
}

message InspectAgentRequest {
    string agent_id = 1;
}

message InspectAgentResponse {
    AgentSummary summary = 1;
    CognitiveState state = 2;
}

message MonitorAgentRequest {
    string agent_id = 1;
}

// --- Data Models ---

enum AgentState {
    PENDING = 0;
    RUNNING = 1;
    SUSPENDED = 2;
    TERMINATED = 3;
    ERROR = 4;
}

message AgentSummary {
    string agent_id = 1;
    string name = 2;
    AgentState state = 3;
    Stats stats = 4;
}

message CognitiveState {
    string context_window_id = 1;
    repeated Message messages = 2;
    repeated ToolState tools = 3;
}

message Message {
    string role = 1; // "system", "user", "assistant", "tool"
    string content = 2;
    google.protobuf.Timestamp timestamp = 3;
}

message ToolState {
    string tool_name = 1;
    string status = 2; // "idle", "executing", "failed"
}

message Budget {
    double max_cost_usd = 1;
    uint32 max_tokens = 2;
}

message Stats {
    uint32 tokens_consumed = 1;
    double cost_usd = 2;
    uint32 step_count = 3;
}

message AgentEvent {
    oneof event {
        string thought = 1;
        ToolCall tool_call = 2;
        ToolResult tool_result = 3;
        string checkpoint_id = 4;
        string error = 5;
    }
    google.protobuf.Timestamp timestamp = 6;
}

message ToolCall {
    string tool_name = 1;
    string arguments_json = 2;
}

message ToolResult {
    string tool_name = 1;
    string result_json = 2;
}

